<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاريعي - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Container with Sidebar -->
    <div class="d-flex">
        <!-- Sidebar -->
        <div id="sidebarContainer"></div>
        
        <!-- Main Content -->
        <main class="with-sidebar flex-grow-1 p-4">
            <div class="container-fluid">
                <!-- Page Header -->
                <div class="mb-4">
                    <h1 class="fw-bold">مشاريعي</h1>
                    <p class="text-muted">إدارة مشاريعك الجارية والمنتهية</p>
                </div>

                <!-- Tabs -->
                <ul class="nav nav-tabs mb-4" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="activeTab" data-bs-toggle="tab" data-bs-target="#activeProjects" type="button" role="tab">
                            <i class="bi bi-play-circle"></i> جاري
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pendingTab" data-bs-toggle="tab" data-bs-target="#pendingProjects" type="button" role="tab">
                            <i class="bi bi-hourglass"></i> معلق
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="completedTab" data-bs-toggle="tab" data-bs-target="#completedProjects" type="button" role="tab">
                            <i class="bi bi-check-circle"></i> منتهي
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="allTab" data-bs-toggle="tab" data-bs-target="#allProjects" type="button" role="tab">
                            <i class="bi bi-list"></i> الكل
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content">
                    <!-- Active Projects -->
                    <div class="tab-pane fade show active" id="activeProjects" role="tabpanel">
                        <div id="activeProjectsContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border" role="status"></div>
                                <p class="text-muted mt-2">جاري التحميل...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pending Projects -->
                    <div class="tab-pane fade" id="pendingProjects" role="tabpanel">
                        <div id="pendingProjectsContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border" role="status"></div>
                                <p class="text-muted mt-2">جاري التحميل...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Completed Projects -->
                    <div class="tab-pane fade" id="completedProjects" role="tabpanel">
                        <div id="completedProjectsContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border" role="status"></div>
                                <p class="text-muted mt-2">جاري التحميل...</p>
                            </div>
                        </div>
                    </div>

                    <!-- All Projects -->
                    <div class="tab-pane fade" id="allProjects" role="tabpanel">
                        <div id="allProjectsContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border" role="status"></div>
                                <p class="text-muted mt-2">جاري التحميل...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/projects.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // التحقق من التسجيل
            AppModule.redirectIfNotAuthenticated('login.html');
            
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const sidebarHTML = await AppModule.loadComponent('components/sidebar.html');
            document.getElementById('sidebarContainer').innerHTML = sidebarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // تحميل المشاريع
            loadMyProjects('in_progress');
            loadMyProjects('pending');
            loadMyProjects('completed');
            loadMyProjects(null);
        });

        async function loadMyProjects(status) {
            try {
                const result = await ProjectsModule.getMyProjects(status);
                if (result.ok) {
                    const projects = result.data.projects || [];
                    
                    if (status === 'in_progress') {
                        displayProjects(projects, 'activeProjectsContainer');
                    } else if (status === 'pending') {
                        displayProjects(projects, 'pendingProjectsContainer');
                    } else if (status === 'completed') {
                        displayProjects(projects, 'completedProjectsContainer');
                    } else if (!status) {
                        displayProjects(projects, 'allProjectsContainer');
                    }
                }
            } catch (error) {
                console.error('خطأ في تحميل المشاريع:', error);
            }
        }

        function displayProjects(projects, containerId) {
            const container = document.getElementById(containerId);
            
            if (!projects || projects.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center">
                        <i class="bi bi-info-circle"></i> لا توجد مشاريع
                    </div>
                `;
                return;
            }

            let html = '<div class="table-responsive"><table class="table"><thead><tr><th>المشروع</th><th>الفئة</th><th>الميزانية</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>';
            
            projects.forEach(project => {
                html += `
                    <tr>
                        <td class="font-weight-bold">${project.title || 'بدون عنوان'}</td>
                        <td>${project.category || 'عام'}</td>
                        <td>${AppModule.formatCurrency(project.budget || 0)}</td>
                        <td><span class="badge bg-${getStatusBadgeColor(project.status)}">${project.status || 'جاري'}</span></td>
                        <td>
                            <a href="project-details.html?id=${project.id}" class="btn btn-sm btn-outline-primary">عرض</a>
                            <button class="btn btn-sm btn-outline-secondary" onclick="editProject('${project.id}')">تعديل</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function getStatusBadgeColor(status) {
            const colors = {
                'in_progress': 'primary',
                'pending': 'warning',
                'completed': 'success',
                'cancelled': 'danger'
            };
            return colors[status] || 'secondary';
        }

        function editProject(projectId) {
            // سيتم تطويره لاحقاً
            window.location.href = `project-details.html?id=${projectId}&edit=true`;
        }
    </script>
</body>
</html>
