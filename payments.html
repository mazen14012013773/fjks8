<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفعات - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Container with Sidebar -->
    <div class="d-flex">
        <!-- Sidebar -->
        <div id="sidebarContainer"></div>
        
        <!-- Main Content -->
        <main class="with-sidebar flex-grow-1 p-4">
            <div class="container-fluid">
                <!-- Page Header -->
                <div class="mb-4">
                    <h1 class="fw-bold">الدفعات</h1>
                    <p class="text-muted">إدارة وتتبع دفعاتك</p>
                </div>

                <!-- Payment Summary Cards -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted mb-2">الرصيد المتاح</h6>
                                <h3 class="fw-bold text-success" id="availableBalance">-</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted mb-2">المعلق</h6>
                                <h3 class="fw-bold text-warning" id="pendingAmount">-</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted mb-2">المسحوب</h6>
                                <h3 class="fw-bold text-info" id="withdrawnAmount">-</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="text-muted mb-2">الإجمالي المكتسب</h6>
                                <h3 class="fw-bold text-primary" id="totalEarned">-</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="mb-4">
                    <a href="withdraw.html" class="btn btn-primary">
                        <i class="bi bi-cash"></i> سحب الأموال
                    </a>
                    <a href="transactions.html" class="btn btn-outline-secondary">
                        <i class="bi bi-graph-up"></i> المعاملات
                    </a>
                </div>

                <!-- Payments Table -->
                <div class="card">
                    <div class="card-header bg-light">
                        <h5 class="card-title mb-0">سجل الدفعات</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>رقم المشروع</th>
                                        <th>المبلغ</th>
                                        <th>التاريخ</th>
                                        <th>الحالة</th>
                                        <th>المزود</th>
                                        <th>الإجراء</th>
                                    </tr>
                                </thead>
                                <tbody id="paymentsTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center py-4">
                                            <div class="spinner-border" role="status"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // التحقق من التسجيل
            AppModule.redirectIfNotAuthenticated('login.html');
            
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const sidebarHTML = await AppModule.loadComponent('components/sidebar.html');
            document.getElementById('sidebarContainer').innerHTML = sidebarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // تحميل بيانات الدفعات
            loadPayments();
        });

        async function loadPayments() {
            try {
                const result = await AppModule.apiRequest('/payments');
                if (result.ok) {
                    const data = result.data;
                    
                    // تحديث الملخصات
                    document.getElementById('availableBalance').textContent = AppModule.formatCurrency(data.availableBalance || 0);
                    document.getElementById('pendingAmount').textContent = AppModule.formatCurrency(data.pendingAmount || 0);
                    document.getElementById('withdrawnAmount').textContent = AppModule.formatCurrency(data.totalWithdrawn || 0);
                    document.getElementById('totalEarned').textContent = AppModule.formatCurrency(data.totalEarned || 0);
                    
                    // عرض الجدول
                    displayPaymentsTable(data.payments || []);
                }
            } catch (error) {
                console.error('خطأ في تحميل الدفعات:', error);
            }
        }

        function displayPaymentsTable(payments) {
            const tbody = document.getElementById('paymentsTableBody');
            
            if (!payments || payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">لا توجد دفعات</td></tr>';
                return;
            }

            let html = '';
            payments.forEach(payment => {
                html += `
                    <tr>
                        <td>${payment.projectId || '-'}</td>
                        <td><strong class="text-primary">${AppModule.formatCurrency(payment.amount || 0)}</strong></td>
                        <td>${AppModule.formatDate(payment.date)}</td>
                        <td><span class="badge bg-${getPaymentStatusBadgeColor(payment.status)}">${payment.status || 'معلق'}</span></td>
                        <td>${payment.provider || 'محفظة'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-secondary" onclick="viewPaymentDetails('${payment.id}')">التفاصيل</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function getPaymentStatusBadgeColor(status) {
            const colors = {
                'completed': 'success',
                'pending': 'warning',
                'failed': 'danger',
                'refunded': 'info'
            };
            return colors[status] || 'secondary';
        }

        function viewPaymentDetails(paymentId) {
            // سيتم تطويره لاحقاً
            AppModule.showInfo('سيتم عرض التفاصيل قريباً');
        }
    </script>
</body>
</html>
