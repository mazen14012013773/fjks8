<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <div class="row" id="profileContainer">
                <!-- Profile Summary -->
                <div class="col-lg-4 col-md-5 mb-4">
                    <div class="card sticky-top" style="top: 20px;">
                        <div class="card-body text-center">
                            <img src="assets/images/avatars/default.jpg" alt="الملف الشخصي" class="rounded-circle mb-3" width="120" height="120">
                            <h3 class="fw-bold" id="freelancerName">-</h3>
                            <p class="text-muted" id="freelancerTitle">-</p>
                            
                            <!-- Rating -->
                            <div class="mb-3">
                                <div class="text-warning mb-2">
                                    <span id="rating">-</span>
                                </div>
                                <small class="text-muted" id="reviewsCount">-</small>
                            </div>

                            <!-- Status -->
                            <div class="mb-3">
                                <span class="badge bg-success" id="statusBadge">متاح</span>
                            </div>

                            <!-- Actions -->
                            <button class="btn btn-primary w-100 mb-2" onclick="sendMessage()">
                                <i class="bi bi-chat"></i> إرسال رسالة
                            </button>
                            <button class="btn btn-outline-primary w-100" data-bs-toggle="modal" data-bs-target="#hireModal">
                                <i class="bi bi-briefcase"></i> للعمل معه
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Profile Details -->
                <div class="col-lg-8 col-md-7">
                    <!-- Overview -->
                    <div class="card mb-3">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">نبذة عامة</h5>
                        </div>
                        <div class="card-body">
                            <p id="profileBio">-</p>
                            
                            <div class="row text-center g-3">
                                <div class="col-md-3">
                                    <h4 class="fw-bold" id="completedProjects">0</h4>
                                    <small class="text-muted">مشروع منجز</small>
                                </div>
                                <div class="col-md-3">
                                    <h4 class="fw-bold" id="activeProjects">0</h4>
                                    <small class="text-muted">مشروع جاري</small>
                                </div>
                                <div class="col-md-3">
                                    <h4 class="fw-bold" id="hourlyRate">-</h4>
                                    <small class="text-muted">سعر كل ساعة</small>
                                </div>
                                <div class="col-md-3">
                                    <h4 class="fw-bold" id="memberSince">-</h4>
                                    <small class="text-muted">عضو منذ</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="card mb-3">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">المهارات</h5>
                        </div>
                        <div class="card-body" id="skillsContainer">
                            <div class="spinner-border" role="status"></div>
                        </div>
                    </div>

                    <!-- Portfolio -->
                    <div class="card mb-3">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">الأعمال السابقة</h5>
                        </div>
                        <div class="card-body" id="portfolioContainer">
                            <div class="spinner-border" role="status"></div>
                        </div>
                    </div>

                    <!-- Reviews -->
                    <div class="card">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">التقييمات</h5>
                        </div>
                        <div class="card-body" id="reviewsContainer">
                            <div class="spinner-border" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Hire Modal -->
    <div class="modal fade" id="hireModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">تقديم عرض</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="hireForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="projectTitle" class="form-label">عنوان المشروع</label>
                            <input type="text" class="form-control" id="projectTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="budget" class="form-label">الميزانية</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="budget" required>
                                <span class="input-group-text">SAR</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">الرسالة</label>
                            <textarea class="form-control" id="message" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                        <button type="submit" class="btn btn-primary">إرسال العرض</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        let freelancerId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // الحصول على معرّف الفريلانسر من URL
            freelancerId = AppModule.getQueryParam('id');
            
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // تحميل بيانات الفريلانسر
            if (freelancerId) {
                loadFreelancerProfile();
            } else {
                document.getElementById('profileContainer').innerHTML = '<p class="text-danger">لم يتم العثور على الملف الشخصي</p>';
            }
            
            // معالج نموذج الهايرينج
            document.getElementById('hireForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                // سيتم تطويره لاحقاً
                AppModule.showSuccess('تم إرسال العرض بنجاح');
            });
        });

        async function loadFreelancerProfile() {
            try {
                const result = await AppModule.apiRequest(`/freelancers/${freelancerId}`);
                if (result.ok) {
                    displayProfile(result.data);
                }
            } catch (error) {
                console.error('خطأ في تحميل الملف الشخصي:', error);
            }
        }

        function displayProfile(freelancer) {
            document.getElementById('freelancerName').textContent = freelancer.name || '-';
            document.getElementById('freelancerTitle').textContent = freelancer.title || '-';
            document.getElementById('profileBio').textContent = freelancer.bio || '-';
            document.getElementById('completedProjects').textContent = freelancer.completedProjects || '0';
            document.getElementById('activeProjects').textContent = freelancer.activeProjects || '0';
            document.getElementById('hourlyRate').textContent = AppModule.formatCurrency(freelancer.hourlyRate || 0) + '/ساعة';
            document.getElementById('memberSince').textContent = AppModule.formatDate(freelancer.memberSince);
            
            // Rating
            const rating = freelancer.rating || 0;
            document.getElementById('rating').innerHTML = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
            document.getElementById('reviewsCount').textContent = `(${freelancer.reviews || 0} تقييم)`;
            
            // Skills
            let skillsHTML = '<div class="d-flex flex-wrap gap-2">';
            (freelancer.skills || []).forEach(skill => {
                skillsHTML += `<span class="badge bg-primary">${skill}</span>`;
            });
            skillsHTML += '</div>';
            document.getElementById('skillsContainer').innerHTML = skillsHTML || '<p class="text-muted">لا توجد مهارات محددة</p>';
            
            // Portfolio
            let portfolioHTML = '<div class="row g-3">';
            (freelancer.portfolio || []).forEach(work => {
                portfolioHTML += `
                    <div class="col-md-6">
                        <div class="card">
                            <img src="assets/images/projects/default.jpg" class="card-img-top" alt="${work.title}">
                            <div class="card-body">
                                <h6 class="card-title">${work.title}</h6>
                                <p class="card-text small text-muted">${work.description}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            portfolioHTML += '</div>';
            document.getElementById('portfolioContainer').innerHTML = portfolioHTML || '<p class="text-muted">لا توجد أعمال سابقة</p>';
            
            // Reviews
            let reviewsHTML = '';
            (freelancer.reviews || []).forEach(review => {
                reviewsHTML += `
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1">${review.clientName}</h6>
                                    <small class="text-warning">★${review.rating}</small>
                                </div>
                                <small class="text-muted">${AppModule.formatDate(review.date)}</small>
                            </div>
                            <p class="mb-0 mt-2">${review.comment}</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('reviewsContainer').innerHTML = reviewsHTML || '<p class="text-muted">لا توجد تقييمات</p>';
        }

        function sendMessage() {
            if (!AuthModule.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            window.location.href = `messages.html?to=${freelancerId}`;
        }
    </script>
</body>
</html>
