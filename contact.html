<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="py-5 bg-light">
            <div class="container">
                <h1 class="text-center fw-bold mb-3">تواصل معنا</h1>
                <p class="text-center text-muted lead">نحن هنا للإجابة على جميع أسئلتك</p>
            </div>
        </section>

        <!-- Contact Form & Info -->
        <section class="py-5">
            <div class="container">
                <div class="row g-4">
                    <!-- Contact Info -->
                    <div class="col-lg-4 col-md-6">
                        <div class="card mb-3">
                            <div class="card-body text-center">
                                <i class="bi bi-envelope text-primary" style="font-size: 2.5rem;"></i>
                                <h5 class="fw-bold mt-3">البريد الإلكتروني</h5>
                                <p class="text-muted"><a href="mailto:info@freelancehub.com" class="text-decoration-none">info@freelancehub.com</a></p>
                            </div>
                        </div>

                        <div class="card mb-3">
                            <div class="card-body text-center">
                                <i class="bi bi-telephone text-success" style="font-size: 2.5rem;"></i>
                                <h5 class="fw-bold mt-3">رقم الهاتف</h5>
                                <p class="text-muted"><a href="tel:+966XXXXXXXXX" class="text-decoration-none">+966 XX XXX XXXX</a></p>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-body text-center">
                                <i class="bi bi-geo-alt text-danger" style="font-size: 2.5rem;"></i>
                                <h5 class="fw-bold mt-3">العنوان</h5>
                                <p class="text-muted">المملكة العربية السعودية<br>الرياض</p>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="col-lg-8 col-md-6">
                        <div class="card">
                            <div class="card-body p-4">
                                <h4 class="fw-bold mb-4">أرسل لنا رسالة</h4>
                                
                                <form id="contactForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="contactName" class="form-label">الاسم</label>
                                            <input type="text" class="form-control" id="contactName" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="contactEmail" class="form-label">البريد الإلكتروني</label>
                                            <input type="email" class="form-control" id="contactEmail" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="contactSubject" class="form-label">الموضوع</label>
                                        <select class="form-select" id="contactSubject" required>
                                            <option value="">اختر الموضوع</option>
                                            <option value="support">دعم فني</option>
                                            <option value="complaint">شكوى</option>
                                            <option value="suggestion">اقتراح</option>
                                            <option value="partnership">شراكة</option>
                                            <option value="other">أخرى</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="contactMessage" class="form-label">الرسالة</label>
                                        <textarea class="form-control" id="contactMessage" rows="5" required></textarea>
                                    </div>

                                    <button type="submit" class="btn btn-primary btn-lg">إرسال الرسالة</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Social Media -->
        <section class="py-5 bg-light">
            <div class="container text-center">
                <h3 class="fw-bold mb-4">تابعنا على وسائل التواصل</h3>
                <div class="d-flex justify-content-center gap-3">
                    <a href="#" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <a href="#" class="btn btn-outline-info btn-lg">
                        <i class="bi bi-twitter"></i>
                    </a>
                    <a href="#" class="btn btn-outline-danger btn-lg">
                        <i class="bi bi-instagram"></i>
                    </a>
                    <a href="#" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-linkedin"></i>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // معالج نموذج الاتصال
            document.getElementById('contactForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const contactData = {
                    name: document.getElementById('contactName').value,
                    email: document.getElementById('contactEmail').value,
                    subject: document.getElementById('contactSubject').value,
                    message: document.getElementById('contactMessage').value
                };
                
                try {
                    const result = await AppModule.apiRequest('/contact', {
                        method: 'POST',
                        body: JSON.stringify(contactData)
                    });
                    
                    if (result.ok) {
                        AppModule.showSuccess('تم إرسال الرسالة بنجاح. سنرد عليك قريباً');
                        document.getElementById('contactForm').reset();
                    }
                } catch (error) {
                    AppModule.showError('فشل إرسال الرسالة');
                }
            });
        });
    </script>
</body>
</html>
