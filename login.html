<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Login Container -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-10">
                    <div class="card shadow-sm">
                        <div class="card-body p-5">
                            <h2 class="text-center fw-bold mb-4">دخول الحساب</h2>
                            
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">البريد الإلكتروني</label>
                                    <input 
                                        type="email" 
                                        class="form-control" 
                                        id="email" 
                                        placeholder="أدخل بريدك الإلكتروني"
                                        required
                                    >
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password" class="form-label">كلمة المرور</label>
                                    <input 
                                        type="password" 
                                        class="form-control" 
                                        id="password" 
                                        placeholder="أدخل كلمة المرور"
                                        required
                                    >
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input 
                                        type="checkbox" 
                                        class="form-check-input" 
                                        id="rememberMe"
                                    >
                                    <label class="form-check-label" for="rememberMe">
                                        تذكرني
                                    </label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 mb-3">دخول</button>
                            </form>
                            
                            <div class="text-center">
                                <p class="text-muted mb-2">
                                    <a href="forgot-password.html" class="text-decoration-none">هل نسيت كلمة المرور؟</a>
                                </p>
                                <p class="text-muted">
                                    ليس لديك حساب؟ 
                                    <a href="register.html" class="text-decoration-none fw-bold">تسجيل جديد</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // معالج نموذج تسجيل الدخول
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const result = await AuthModule.login(email, password);
                    if (result) {
                        AppModule.showSuccess('تم تسجيل الدخول بنجاح');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }
                } catch (error) {
                    AppModule.showError('فشل تسجيل الدخول. تحقق من بيانات الدخول');
                }
            });
            
            if (AuthModule.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
