<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسائل - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Container with Sidebar -->
    <div class="d-flex">
        <!-- Sidebar -->
        <div id="sidebarContainer"></div>
        
        <!-- Main Content -->
        <main class="with-sidebar flex-grow-1 p-4">
            <div class="container-fluid">
                <div class="row g-3" style="height: 80vh;">
                    <!-- Conversations List -->
                    <div class="col-lg-4 col-md-5">
                        <div class="card h-100 d-flex flex-column">
                            <div class="card-header bg-light">
                                <div class="input-group input-group-sm">
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="conversationSearch"
                                        placeholder="ابحث عن محادثة..."
                                    >
                                    <button class="btn btn-outline-secondary" type="button">
                                        <i class="bi bi-search"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body flex-grow-1 overflow-auto" id="conversationsContainer">
                                <div class="text-center text-muted py-5">
                                    <i class="bi bi-hourglass-split"></i>
                                    <p>جاري التحميل...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Area -->
                    <div class="col-lg-8 col-md-7">
                        <div class="card h-100 d-flex flex-column">
                            <!-- Chat Header -->
                            <div class="card-header bg-light border-bottom" id="chatHeader">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div>
                                        <h6 class="mb-0" id="chatPartnerName">اختر محادثة</h6>
                                        <small class="text-muted" id="chatPartnerStatus">-</small>
                                    </div>
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Messages Area -->
                            <div class="card-body flex-grow-1 overflow-auto" id="messagesContainer">
                                <div class="text-center text-muted py-5">
                                    <i class="bi bi-chat"></i>
                                    <p>اختر محادثة لبدء الدردشة</p>
                                </div>
                            </div>

                            <!-- Message Input -->
                            <div class="card-footer border-top p-3">
                                <form id="messageForm" class="d-none">
                                    <div class="input-group">
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            id="messageInput"
                                            placeholder="اكتب رسالتك..."
                                        >
                                        <button class="btn btn-primary" type="submit">
                                            <i class="bi bi-send"></i> إرسال
                                        </button>
                                    </div>
                                </form>
                                <div class="text-center text-muted py-2" id="noConversationMsg">
                                    اختر أو ابدأ محادثة جديدة
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/chat.js"></script>
    
    <script>
        let currentConversationId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // التحقق من التسجيل
            AppModule.redirectIfNotAuthenticated('login.html');
            
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const sidebarHTML = await AppModule.loadComponent('components/sidebar.html');
            document.getElementById('sidebarContainer').innerHTML = sidebarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // تحميل المحادثات
            loadConversations();
            
            // معالج إرسال رسالة
            document.getElementById('messageForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = document.getElementById('messageInput').value;
                
                if (!message.trim() || !currentConversationId) return;
                
                try {
                    const result = await ChatModule.sendMessage(currentConversationId, message);
                    if (result.ok) {
                        document.getElementById('messageInput').value = '';
                        loadMessages(currentConversationId);
                    }
                } catch (error) {
                    AppModule.showError('فشل إرسال الرسالة');
                }
            });
        });

        async function loadConversations() {
            try {
                const result = await ChatModule.getConversations();
                if (result.ok) {
                    displayConversations(result.data.conversations || []);
                }
            } catch (error) {
                console.error('خطأ في تحميل المحادثات:', error);
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversationsContainer');
            
            if (!conversations || conversations.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-5">لا توجد محادثات</p>';
                return;
            }

            let html = '<div class="list-group list-group-flush">';
            conversations.forEach(conv => {
                html += `
                    <button 
                        type="button" 
                        class="list-group-item list-group-item-action" 
                        onclick="selectConversation('${conv.id}', '${conv.participantName}')"
                    >
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${conv.participantName || 'مستخدم'}</h6>
                                <small class="text-muted text-truncate" style="max-width: 200px; display: block;">
                                    ${conv.lastMessage || 'لا توجد رسائل'}
                                </small>
                            </div>
                            ${conv.unreadCount ? `<span class="badge bg-danger">${conv.unreadCount}</span>` : ''}
                        </div>
                    </button>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function selectConversation(conversationId, participantName) {
            currentConversationId = conversationId;
            document.getElementById('chatPartnerName').textContent = participantName;
            document.getElementById('messageForm').classList.remove('d-none');
            document.getElementById('noConversationMsg').classList.add('d-none');
            
            await loadMessages(conversationId);
        }

        async function loadMessages(conversationId) {
            try {
                const result = await ChatModule.getMessages(conversationId);
                if (result.ok) {
                    displayMessages(result.data.messages || []);
                    // وضع علامة كمقروءة
                    await ChatModule.markAsRead(conversationId);
                }
            } catch (error) {
                console.error('خطأ في تحميل الرسائل:', error);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-5">ابدأ المحادثة</p>';
                return;
            }

            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.senderId === AuthModule.getUser().id;
                html += `
                    <div class="mb-3 text-${isOwn ? 'end' : 'start'}">
                        <div class="bg-${isOwn ? 'primary' : 'light'} d-inline-block px-3 py-2 rounded-3" style="max-width: 70%;">
                            <p class="mb-0 ${isOwn ? 'text-white' : 'text-dark'}">
                                ${msg.message}
                            </p>
                            <small class="${isOwn ? 'text-white-50' : 'text-muted'}">
                                ${AppModule.formatDate(msg.createdAt)}
                            </small>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            // التمرير إلى الأسفل
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
