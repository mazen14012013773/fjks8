<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمون - إدارة FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <!-- Navigation & Sidebar (يمكن إعادة استخدام من dashboard) -->
    
    <!-- Main Content -->
    <main class="p-4">
        <div class="container-fluid">
            <h1 class="fw-bold mb-4">إدارة المستخدمين</h1>

            <!-- Search & Filter -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchUsers" placeholder="بحث عن مستخدم...">
                </div>
                <div class="col-md-6">
                    <select class="form-select" id="userType">
                        <option value="">جميع الأنواع</option>
                        <option value="freelancer">مستقل</option>
                        <option value="employer">صاحب مشروع</option>
                    </select>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>البريد الإلكتروني</th>
                                    <th>النوع</th>
                                    <th>الحالة</th>
                                    <th>تاريخ التسجيل</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr>
                                    <td colspan="6" class="text-center py-4">
                                        <div class="spinner-border" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            AppModule.redirectIfNotAuthenticated('../login.html');
            loadUsers();
        });

        async function loadUsers() {
            try {
                const result = await DashboardModule.getUsers(1, 50);
                if (result.ok) {
                    displayUsers(result.data.users || []);
                }
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">لا توجد مستخدمات</td></tr>';
                return;
            }

            let html = '';
            users.forEach(user => {
                html += `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td><span class="badge bg-${user.type === 'freelancer' ? 'primary' : 'success'}">${user.type}</span></td>
                        <td><span class="badge bg-${user.active ? 'success' : 'danger'}">${user.active ? 'نشط' : 'معطل'}</span></td>
                        <td>${AppModule.formatDate(user.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewUser('${user.id}')">عرض</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${user.id}')">حذف</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function viewUser(userId) {
            // سيتم تطويره
        }

        function deleteUser(userId) {
            if (confirm('هل تأكد من حذف هذا المستخدم؟')) {
                // سيتم تطويره
            }
        }
    </script>
</body>
</html>
