<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشاريع - FreelanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbarContainer"></div>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <!-- Page Header -->
            <div class="mb-4">
                <h1 class="fw-bold">المشاريع المتاحة</h1>
                <p class="text-muted">ابحث عن المشاريع المناسبة لك</p>
            </div>

            <!-- Filters Section -->
            <div class="row mb-4">
                <div class="col-lg-3">
                    <div class="card">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">الفلاتر</h6>
                            
                            <!-- Search -->
                            <div class="mb-3">
                                <label class="form-label">بحث</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="searchInput" 
                                    placeholder="ابحث عن مشروع..."
                                >
                            </div>

                            <!-- Status Filter -->
                            <div class="mb-3">
                                <label class="form-label">الحالة</label>
                                <select class="form-select" id="statusFilter">
                                    <option value="">جميع الحالات</option>
                                    <option value="open">مفتوح</option>
                                    <option value="in_progress">جاري</option>
                                    <option value="closed">مغلق</option>
                                </select>
                            </div>

                            <!-- Category Filter -->
                            <div class="mb-3">
                                <label class="form-label">الفئة</label>
                                <select class="form-select" id="categoryFilter">
                                    <option value="">جميع الفئات</option>
                                    <option value="development">تطوير</option>
                                    <option value="design">تصميم</option>
                                    <option value="writing">كتابة</option>
                                    <option value="marketing">تسويق</option>
                                </select>
                            </div>

                            <!-- Budget Filter -->
                            <div class="mb-3">
                                <label class="form-label">الميزانية</label>
                                <div class="input-group input-group-sm mb-2">
                                    <input 
                                        type="number" 
                                        class="form-control" 
                                        id="minBudget" 
                                        placeholder="الحد الأدنى"
                                    >
                                </div>
                                <div class="input-group input-group-sm">
                                    <input 
                                        type="number" 
                                        class="form-control" 
                                        id="maxBudget" 
                                        placeholder="الحد الأقصى"
                                    >
                                </div>
                            </div>

                            <button 
                                class="btn btn-primary w-100 btn-sm" 
                                onclick="applyFilters()"
                            >
                                تطبيق الفلاتر
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Projects List -->
                <div class="col-lg-9">
                    <div id="projectsListContainer">
                        <div class="text-center py-5">
                            <div class="spinner-border" role="status"></div>
                            <p class="text-muted mt-2">جاري التحميل...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="paginationContainer" class="mt-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/projects.js"></script>
    
    <script>
        let currentPage = 1;
        const itemsPerPage = 12;

        document.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات
            const navbarHTML = await AppModule.loadComponent('components/navbar.html');
            document.getElementById('navbarContainer').innerHTML = navbarHTML;
            
            const footerHTML = await AppModule.loadComponent('components/footer.html');
            document.getElementById('footerContainer').innerHTML = footerHTML;
            
            // تهيئة واجهة المصادقة
            initializeAuthUI();
            
            // تحميل المشاريع
            loadProjects();
        });

        async function loadProjects(page = 1) {
            currentPage = page;
            const searchText = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            const category = document.getElementById('categoryFilter').value;

            try {
                const result = await ProjectsModule.getProjects({
                    search: searchText,
                    status: status,
                    category: category,
                    page: page,
                    limit: itemsPerPage
                });

                if (result.ok) {
                    displayProjects(result.data.projects || []);
                    displayPagination(result.data.pagination || {});
                } else {
                    AppModule.showError('فشل تحميل المشاريع');
                }
            } catch (error) {
                console.error('خطأ في تحميل المشاريع:', error);
                AppModule.showError('حدث خطأ في تحميل المشاريع');
            }
        }

        function displayProjects(projects) {
            const container = document.getElementById('projectsListContainer');
            
            if (!projects || projects.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center">
                        <i class="bi bi-info-circle"></i> لم يتم العثور على مشاريع
                    </div>
                `;
                return;
            }

            let html = '<div class="row g-3">';
            projects.forEach(project => {
                html += `
                    <div class="col-lg-4 col-md-6">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${project.title || 'بدون عنوان'}</h5>
                                <p class="card-text text-muted" style="min-height: 3em;">
                                    ${project.description || 'لا توجد وصف'}
                                </p>
                                
                                <div class="mb-3">
                                    <small class="badge bg-info">${project.category || 'عام'}</small>
                                    <small class="badge bg-${project.status === 'open' ? 'success' : 'warning'}">
                                        ${project.status || 'جاري'}
                                    </small>
                                </div>

                                <div class="mb-3">
                                    <strong class="text-primary">${AppModule.formatCurrency(project.budget || 0)}</strong>
                                </div>

                                <a href="project-details.html?id=${project.id}" class="btn btn-primary w-100 btn-sm">
                                    عرض التفاصيل
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function displayPagination(pagination) {
            const container = document.getElementById('paginationContainer');
            if (!pagination.totalPages || pagination.totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<nav><ul class="pagination justify-content-center">';
            
            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="loadProjects(${i}); return false;">
                            ${i}
                        </a>
                    </li>
                `;
            }
            
            html += '</ul></nav>';
            container.innerHTML = html;
        }

        function applyFilters() {
            loadProjects(1);
        }
    </script>
</body>
</html>
